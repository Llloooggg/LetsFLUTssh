# cargo-deny config — runs in CI (`.github/workflows/ci.yml::rust-ci`).
#
# Three gates:
#   1. advisories — no known-CVE crates in the dep tree
#   2. licenses   — every transitive license is on the allow-list
#   3. bans       — duplicate versions warn (catches near-duplicates),
#                   wildcard requirements deny (forbids `crate = "*"`)
#
# When this fails in CI, fix the root cause — never blanket-allow new
# licenses or ignore an advisory without writing the rationale right
# next to the entry.

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
  # RUSTSEC-2023-0071: Marvin Attack timing sidechannel in
  # `rsa` 0.10.0-rc.12 (pulled transitively by russh-keys' RSA
  # support). The advisory states "No safe upgrade is available" —
  # upstream RustCrypto/RSA is migrating to a constant-time impl
  # but no fixed version is published yet.
  #
  # Threat model in our context:
  #   - Vulnerability is exploitable only by an attacker who can
  #     observe SSH RSA signing timing over the network. Local /
  #     LAN attacker scenario.
  #   - Affects RSA keys only. Ed25519 and ECDSA keys go through
  #     other crates (curve25519-dalek, ecdsa) and are unaffected.
  #   - Users are guided towards Ed25519 in the key-generation UI
  #     (and have been since the dartssh2 era — see
  #     docs/USER_GUIDE.md § Keys).
  #
  # Mitigation roadmap:
  #   1. Document the limitation in ARCHITECTURE §3.14 + USER_GUIDE
  #      so RSA-key users are aware (now)
  #   2. When 1.5+ flips the Rust transport default, evaluate
  #      `russh = { default-features = false, features = [...] }`
  #      with `rsa` disabled — break compat with RSA private keys
  #      in the Rust path, force the user back to dartssh2 for
  #      legacy RSA. Depends on whether russh requires the rsa
  #      feature for protocol-side RSA handshake compatibility.
  #   3. Track upstream RustCrypto/RSA constant-time milestone:
  #      https://github.com/RustCrypto/RSA/issues/626
  "RUSTSEC-2023-0071",
]

[licenses]
# Anything not on this list fails the build. Add new entries only
# after a license review, not just because cargo-deny complained.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",     # russh-cryptovec — file-level copyleft only, OK to bundle
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "0BSD",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = [
  # Add specific banned crates here as we identify them.
]
skip = [
  # Some duplicate transitive versions are unavoidable; pin them
  # here with a comment when justified. Empty for now.
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
