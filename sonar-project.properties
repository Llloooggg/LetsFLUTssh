sonar.projectKey=Llloooggg_LetsFLUTssh
sonar.organization=llloooggg
sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8
# Generated code + localisations: excluded from both the source
# scan (SonarCloud would flag auto-generated "code smells") AND
# from coverage math (denominator would be dominated by 11 K l10n
# lines + 3 K drift generator output that no test can reasonably
# hit). See Makefile's post-test lcov filter for the mirrored
# local coverage path — both must match so a "95% green locally,
# red on Sonar" mismatch cannot happen.
sonar.exclusions=lib/l10n/**,**/*.g.dart,**/*.freezed.dart
sonar.coverage.exclusions=lib/l10n/**,**/*.g.dart,**/*.freezed.dart
sonar.dart.lcov.reportPaths=coverage/lcov.info
