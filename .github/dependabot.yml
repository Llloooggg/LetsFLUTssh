version: 2
# Monthly cadence across every ecosystem. The weekly default was too
# noisy for a solo-maintainer repo — PRs landed faster than the merge
# flow could review them and the backlog buried the real breakage.
# Monthly batches still catches security bumps inside an acceptable
# window (GitHub's native security-advisory PRs bypass this schedule
# and ship immediately regardless) while keeping the normal
# bump-PR load at ~1-3 PRs/month total.
updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
  # Tracks HEAD of every registered git submodule. We use it for
  # third_party/SQLite3MultipleCiphers — the upstream amalgamation of
  # SQLite + the ChaCha20-Poly1305 page cipher, compiled in-tree via
  # the sqlite3 build hook.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "monthly"
  # Rust security/transport core lives under rust/. Dependabot tracks
  # the workspace Cargo.lock at /rust and opens monthly bump PRs for
  # russh, tokio, RustCrypto, and the rest of the dep tree. Bumps that
  # cross a russh major (e.g. 0.59 → 0.60) need manual review — the
  # 0.60 bump is currently blocked on the upstream RustCrypto
  # release-candidate set (see docs/RUST_CORE_MIGRATION_PLAN.md §13
  # 1.1a / 1.2a notes).
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "monthly"
