name: CI / SonarCloud

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      ci-run-id:
        description: 'CI run ID to pull coverage from (optional)'
        required: false

permissions: read-all

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev') &&
       github.event.workflow_run.head_repository.id == github.event.repository.id)
    permissions:
      actions: read
      contents: read
    env:
      BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      CI_RUN_ID: ${{ github.event.workflow_run.id || inputs.ci-run-id }}
    steps:
      - name: Checkout repository (for SCM data)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download SonarCloud source artifact
        if: env.CI_RUN_ID != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sonar-source
          path: .
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download coverage artifact
        if: env.CI_RUN_ID != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Setup Flutter
        if: env.CI_RUN_ID != ''
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: env.CI_RUN_ID != ''
        run: flutter pub get

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ env.BRANCH }}
