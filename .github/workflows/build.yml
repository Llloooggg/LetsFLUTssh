name: CI & Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: analyze-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pubspec.yaml
        id: get
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}"

  build-linux-x64:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev lld

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APK (arm64 + arm + x64)
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/letsflutssh-${{ needs.version.outputs.version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/letsflutssh-${{ needs.version.outputs.version }}.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/linux-x64/letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz
            artifacts/windows-x64/letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip
            artifacts/macos-universal/letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz
            artifacts/android-apk/letsflutssh-${{ needs.version.outputs.version }}.apk
