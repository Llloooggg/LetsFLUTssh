name: CI & Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'test/**'
      - '.github/workflows/sonarcloud.yml'
      - 'sonar-project.properties'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'test/**'
      - '.github/workflows/sonarcloud.yml'
      - 'sonar-project.properties'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Check outdated dependencies
        run: dart pub outdated

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4

  version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: analyze-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Extract version from pubspec.yaml
        id: get
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}"

  build-linux-x64:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev lld

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz .

      - name: Package AppImage
        run: |
          # Create AppDir structure
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib $APPDIR/usr/share/applications $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* $APPDIR/usr/bin/
          cp linux/packaging/letsflutssh.desktop $APPDIR/usr/share/applications/
          cp linux/packaging/letsflutssh.desktop $APPDIR/
          cp assets/icons/icon.png $APPDIR/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          cp assets/icons/icon.png $APPDIR/letsflutssh.png
          # Create AppRun
          cat > $APPDIR/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/letsflutssh" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun
          # Download appimagetool and build
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream $APPDIR letsflutssh-${{ needs.version.outputs.version }}-linux-x64.AppImage

      - name: Package deb
        run: |
          VER=${{ needs.version.outputs.version }}
          PKG=letsflutssh_${VER}_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/lib/letsflutssh
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          # Copy app bundle to /usr/lib, symlink binary
          cp -r build/linux/x64/release/bundle/* $PKG/usr/lib/letsflutssh/
          ln -sf /usr/lib/letsflutssh/letsflutssh $PKG/usr/bin/letsflutssh
          cp linux/packaging/letsflutssh.desktop $PKG/usr/share/applications/
          cp assets/icons/icon.png $PKG/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          # Control file
          cat > $PKG/DEBIAN/control << EOF
          Package: letsflutssh
          Version: ${VER}
          Architecture: amd64
          Maintainer: LetsFLUTssh <noreply@letsflutssh.dev>
          Description: Lightweight cross-platform SSH/SFTP client
           A full-featured SSH terminal and SFTP file browser with session
           management, encrypted credential storage, and tiling terminal layout.
          Depends: libgtk-3-0
          Section: net
          Priority: optional
          EOF
          dpkg-deb --build $PKG
          mv ${PKG}.deb letsflutssh-${VER}-linux-amd64.deb

      - uses: actions/upload-artifact@v5
        with:
          name: linux-x64
          path: |
            letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz
            letsflutssh-${{ needs.version.outputs.version }}-linux-x64.AppImage
            letsflutssh-${{ needs.version.outputs.version }}-linux-amd64.deb

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package EXE installer
        run: |
          $env:APP_VERSION = "${{ needs.version.outputs.version }}"
          $env:BUILD_DIR = "${{ github.workspace }}\build\windows\x64\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\setup.iss
          Move-Item "windows\packaging\Output\letsflutssh-${{ needs.version.outputs.version }}-windows-x64-setup.exe" .

      - uses: actions/upload-artifact@v5
        with:
          name: windows-x64
          path: |
            letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip
            letsflutssh-${{ needs.version.outputs.version }}-windows-x64-setup.exe

  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Package tar.gz
        run: |
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz *.app

      - name: Package dmg
        run: |
          hdiutil create -volname "LetsFLUTssh" -srcfolder build/macos/Build/Products/Release/letsflutssh.app -ov -format UDZO letsflutssh-${{ needs.version.outputs.version }}-macos-universal.dmg

      - uses: actions/upload-artifact@v5
        with:
          name: macos-universal
          path: |
            letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz
            letsflutssh-${{ needs.version.outputs.version }}-macos-universal.dmg

  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APKs (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk letsflutssh-${{ needs.version.outputs.version }}-android-arm64.apk
          mv app-armeabi-v7a-release.apk letsflutssh-${{ needs.version.outputs.version }}-android-arm.apk
          mv app-x86_64-release.apk letsflutssh-${{ needs.version.outputs.version }}-android-x64.apk

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/letsflutssh-*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Detect pre-release
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]] || [[ "$TAG" == *-alpha* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            artifacts/linux-x64/letsflutssh-${{ needs.version.outputs.version }}-linux-x64.tar.gz
            artifacts/linux-x64/letsflutssh-${{ needs.version.outputs.version }}-linux-x64.AppImage
            artifacts/linux-x64/letsflutssh-${{ needs.version.outputs.version }}-linux-amd64.deb
            artifacts/windows-x64/letsflutssh-${{ needs.version.outputs.version }}-windows-x64.zip
            artifacts/windows-x64/letsflutssh-${{ needs.version.outputs.version }}-windows-x64-setup.exe
            artifacts/macos-universal/letsflutssh-${{ needs.version.outputs.version }}-macos-universal.tar.gz
            artifacts/macos-universal/letsflutssh-${{ needs.version.outputs.version }}-macos-universal.dmg
            artifacts/android-apk/letsflutssh-${{ needs.version.outputs.version }}-android-arm64.apk
            artifacts/android-apk/letsflutssh-${{ needs.version.outputs.version }}-android-arm.apk
            artifacts/android-apk/letsflutssh-${{ needs.version.outputs.version }}-android-x64.apk
