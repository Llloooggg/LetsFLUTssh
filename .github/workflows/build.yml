name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - name: Wait for CI and OSV-Scanner to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          MAX_ATTEMPTS=30  # 30 × 20s = 10 min max wait
          GRACE_ATTEMPTS=6 # wait 120s for checks to appear (tag may arrive before CI starts)

          wait_for_check() {
            local CHECK_NAME="$1"
            local LABEL="$2"
            echo "Checking ${LABEL} status for commit ${SHA}..."

            for i in $(seq 1 $MAX_ATTEMPTS); do
              CHECK_EXISTS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
                --jq "[.check_runs[] | select(.name == \"${CHECK_NAME}\" and (.app.slug == \"github-actions\"))] | length")

              if [ "$CHECK_EXISTS" = "0" ]; then
                if [ "$i" -ge "$GRACE_ATTEMPTS" ]; then
                  if [ "$IS_MANUAL" = "true" ]; then
                    echo "::warning::${LABEL} was never triggered for commit ${SHA} — proceeding anyway (manual dispatch)."
                    return 0
                  fi
                  echo "::error::${LABEL} was never triggered for commit ${SHA}. This usually means the tag points to a commit that didn't change code paths covered by CI."
                  return 1
                fi
                echo "${LABEL} not found yet — waiting 20s (grace ${i}/${GRACE_ATTEMPTS})..."
                sleep 20
                continue
              fi

              STATUS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
                --jq ".check_runs[] | select(.name == \"${CHECK_NAME}\" and (.app.slug == \"github-actions\")) | .conclusion" \
                | head -1)

              if [ "$STATUS" = "success" ]; then
                echo "${LABEL} passed ✓"
                return 0
              elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
                echo "::error::${LABEL} failed on this commit (status: '${STATUS}'). Fix before releasing."
                return 1
              fi

              if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
                echo "${LABEL} status: in_progress — waiting 20s (attempt ${i}/${MAX_ATTEMPTS})..."
                sleep 20
              fi
            done

            # Timed out
            if [ "$IS_MANUAL" = "true" ]; then
              echo "::warning::${LABEL} did not complete in time — proceeding anyway (manual dispatch)"
              return 0
            else
              echo "::error::${LABEL} did not complete within 10 minutes. Check status manually."
              return 1
            fi
          }

          wait_for_check "analyze-and-test" "CI"
          wait_for_check "scan" "OSV-Scanner"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Extract version from pubspec.yaml
        id: get
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}"

  build-linux-x64:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev lld

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz .

      - name: Package AppImage
        run: |
          # Create AppDir structure
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib $APPDIR/usr/share/applications $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* $APPDIR/usr/bin/
          cp linux/packaging/letsflutssh.desktop $APPDIR/usr/share/applications/
          cp linux/packaging/letsflutssh.desktop $APPDIR/
          cp assets/icons/icon.png $APPDIR/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          cp assets/icons/icon.png $APPDIR/letsflutssh.png
          # Create AppRun
          cat > $APPDIR/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/letsflutssh" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun
          # Download appimagetool and build
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream $APPDIR letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage

      - name: Package deb
        run: |
          VER=${{ needs.preflight.outputs.version }}
          PKG=letsflutssh_${VER}_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/lib/letsflutssh
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          # Copy app bundle to /usr/lib, symlink binary
          cp -r build/linux/x64/release/bundle/* $PKG/usr/lib/letsflutssh/
          ln -sf /usr/lib/letsflutssh/letsflutssh $PKG/usr/bin/letsflutssh
          cp linux/packaging/letsflutssh.desktop $PKG/usr/share/applications/
          cp assets/icons/icon.png $PKG/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          # Control file
          cat > $PKG/DEBIAN/control << EOF
          Package: letsflutssh
          Version: ${VER}
          Architecture: amd64
          Maintainer: LetsFLUTssh <noreply@letsflutssh.dev>
          Description: Lightweight cross-platform SSH/SFTP client
           A full-featured SSH terminal and SFTP file browser with session
           management, encrypted credential storage, and tiling terminal layout.
          Depends: libgtk-3-0
          Section: net
          Priority: optional
          EOF
          dpkg-deb --build $PKG
          mv ${PKG}.deb letsflutssh-${VER}-linux-amd64.deb

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linux-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb

  build-windows:
    needs: preflight
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package EXE installer
        run: |
          $env:APP_VERSION = "${{ needs.preflight.outputs.version }}"
          $env:BUILD_DIR = "${{ github.workspace }}\build\windows\x64\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\setup.iss
          Move-Item "windows\packaging\Output\letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe" .

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: windows-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe

  build-macos:
    needs: preflight
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Package tar.gz
        run: |
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz *.app

      - name: Package dmg
        run: |
          hdiutil create -volname "LetsFLUTssh" -srcfolder build/macos/Build/Products/Release/letsflutssh.app -ov -format UDZO letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: macos-universal
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

  build-android:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Build APKs (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
          mv app-armeabi-v7a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
          mv app-x86_64-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-apk
          retention-days: 7
          path: build/app/outputs/flutter-apk/letsflutssh-*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
    needs: [preflight, build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/linux-x64/*
            artifacts/windows-x64/*
            artifacts/macos-universal/*
            artifacts/android-apk/*

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v${{ needs.preflight.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag if missing (manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag ${TAG}"
          else
            echo "Tag ${TAG} already exists"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Get the tag immediately before this one (by version order)
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | awk "found{print;exit} /^${TAG}\$/{found=1}")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="$PREV_TAG..$TAG"
          fi

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""

          while IFS= read -r line; do
            MSG="${line#* }"
            case "$MSG" in
              feat:*) FEATURES="$FEATURES- ${MSG#feat: }\n" ;;
              fix:*)  FIXES="$FIXES- ${MSG#fix: }\n" ;;
              refactor:*) IMPROVEMENTS="$IMPROVEMENTS- ${MSG#refactor: }\n" ;;
            esac
          done <<< "$(git log "$RANGE" --oneline --no-merges)"

          BODY=""
          [ -n "$FEATURES" ] && BODY="$BODY### Features\n$FEATURES\n"
          [ -n "$FIXES" ] && BODY="$BODY### Fixes\n$FIXES\n"
          [ -n "$IMPROVEMENTS" ] && BODY="$BODY### Improvements\n$IMPROVEMENTS\n"
          [ -z "$BODY" ] && BODY="Maintenance release.\n"

          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk
