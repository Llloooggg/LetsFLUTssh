name: CI & Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-linux-x64:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev lld

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/letsflutssh-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: letsflutssh-linux-x64.tar.gz

  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: letsflutssh-windows-x64.zip

  build-macos:
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-macos-universal.tar.gz *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: letsflutssh-macos-universal.tar.gz

  build-android:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build APK (arm64 + arm + x64)
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=beta-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "name=Beta (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          draft: false
          files: |
            artifacts/linux-x64/letsflutssh-linux-x64.tar.gz
            artifacts/windows-x64/letsflutssh-windows-x64.zip
            artifacts/macos-universal/letsflutssh-macos-universal.tar.gz
            artifacts/android-apk/app-release.apk
