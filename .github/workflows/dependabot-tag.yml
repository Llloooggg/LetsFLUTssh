name: Dependabot Auto-Tag

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: read-all

jobs:
  auto-tag:
    # Only tag if CI passed and the commit is an automated dependency bump
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      contains(github.event.workflow_run.head_commit.message, 'chore(deps):')
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-release
      cancel-in-progress: false
    steps:
      - name: Create tag via API
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHA="$COMMIT_SHA"
          REPO="${{ github.repository }}"

          # Read pubspec.yaml via API (no checkout — avoids untrusted-checkout alert)
          VER=$(gh api "repos/${REPO}/contents/pubspec.yaml?ref=${SHA}" \
            --jq '.content' | base64 -d | grep '^version:' | sed 's/version: *//;s/+.*//')
          TAG="v${VER}"

          # Bail out if tag already exists (idempotent)
          if gh api "repos/${REPO}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          # Create annotated tag object
          TAG_SHA=$(gh api "repos/${REPO}/git/tags" \
            -f tag="$TAG" -f message="$TAG" -f object="$SHA" -f type="commit" \
            --jq '.sha')

          # Create tag ref pointing to the tag object
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/${TAG}" -f sha="$TAG_SHA"

          echo "Created tag ${TAG} → ${SHA}"
