name: Dependabot Auto-Tag

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: read-all

jobs:
  auto-tag:
    # Only tag if CI passed and the commit is an automated dependency bump
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      contains(github.event.workflow_run.head_commit.message, 'chore(deps):')
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Create tag and push
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"

          # Extract version from the commit that was tested
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VER="${FULL%%+*}"
          TAG="v${VER}"

          # Bail out if tag already exists (idempotent)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$SHA" -m "$TAG"
          git push origin "$TAG"
