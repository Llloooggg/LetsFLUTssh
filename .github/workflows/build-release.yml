name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    outputs:
      version: ${{ steps.get.outputs.version }}
      source_date_epoch: ${{ steps.get.outputs.source_date_epoch }}
    steps:
      - name: Verify CI status
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          REF="${{ github.ref }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push — auto-tag already verified CI passed
            echo "Tag-triggered build — CI verified by auto-tag ✓"
          elif [ "$REF" != "refs/heads/main" ]; then
            # Non-main branch dispatch (dev, feature/*, fix/*, anything
            # below release line) — local `make check` is the source of
            # truth; CI is not required to gate those builds. The
            # branch name is not part of the published artifact, so a
            # mis-gated dispatch here only produces throwaway debug
            # output. Main stays enforced — release artefacts MUST
            # match a green CI run.
            echo "Non-main branch dispatch (${REF}) — skipping CI check (local validation) ✓"
          else
            # Main-branch manual dispatch — verify once, no polling
            STATUS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name == "ci" and .app.slug == "github-actions")] | if length == 0 then "missing" else .[0].conclusion // "pending" end')

            if [ "$STATUS" = "success" ]; then
              echo "CI passed ✓"
            else
              echo "::error::CI status is '${STATUS}' for ${SHA}. Run CI first, then retry."
              exit 1
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false
          # fetch-depth: 1 keeps `.git/HEAD` populated so `git log`
          # can report the commit timestamp for SOURCE_DATE_EPOCH.
          fetch-depth: 1

      - name: Extract version + source-date-epoch from pubspec.yaml
        id: get
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}"

          # Reproducible-build clock. Every downstream tool that
          # honours SOURCE_DATE_EPOCH (dpkg-deb, appimagetool, tar
          # --mtime, Python ZipFile wrapper) stamps artefacts with
          # this timestamp instead of the CI runner's wall clock,
          # so two runs of the same commit produce byte-identical
          # output. Source: the committer-date of the HEAD commit
          # the workflow is building (for tag pushes, the commit
          # the tag points at).
          SDE=$(git log -1 --format=%ct HEAD)
          echo "source_date_epoch=${SDE}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH: ${SDE}"

  build-linux-x64:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Reproducible-build clock: honoured by dpkg-deb, appimagetool,
      # gzip-with-`-n`, tar `--mtime=@${SOURCE_DATE_EPOCH}`. Same two
      # runs on the same commit produce byte-identical artefacts,
      # so a user can rebuild from source and compare the sha256 of
      # our official `.deb` / `.AppImage` / `.tar.gz` against their
      # own as a supply-chain check.
      SOURCE_DATE_EPOCH: ${{ needs.preflight.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev lld

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          # Reproducible tar: sort entries by name, wipe uid/gid/
          # owner strings, pin mtime to SOURCE_DATE_EPOCH. Pipe into
          # `gzip -n` so the compressed stream carries no filename
          # / timestamp in its own header. Two runs at the same
          # commit produce an identical sha256.
          cd build/linux/x64/release/bundle
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -cf - . \
            | gzip -n -9 \
            > ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: appimagetool
          key: appimagetool-1.9.1-x86_64-ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0

      - name: Package AppImage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download appimagetool if not cached, then verify hash (even from cache)
          if [ ! -f appimagetool ]; then
            gh release download 1.9.1 --repo AppImage/appimagetool --pattern 'appimagetool-x86_64.AppImage' --output appimagetool
          fi
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  appimagetool" | sha256sum -c
          chmod +x appimagetool
          # Create AppDir structure
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib $APPDIR/usr/share/applications $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* $APPDIR/usr/bin/
          cp linux/packaging/letsflutssh.desktop $APPDIR/usr/share/applications/
          cp linux/packaging/letsflutssh.desktop $APPDIR/
          cp assets/icons/icon.png $APPDIR/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          cp assets/icons/icon.png $APPDIR/letsflutssh.png
          # Create AppRun
          cat > $APPDIR/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/letsflutssh" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun
          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream $APPDIR letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage

      - name: Package deb
        run: |
          VER=${{ needs.preflight.outputs.version }}
          PKG=letsflutssh_${VER}_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/lib/letsflutssh
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          # Copy app bundle to /usr/lib, symlink binary
          cp -r build/linux/x64/release/bundle/* $PKG/usr/lib/letsflutssh/
          ln -sf /usr/lib/letsflutssh/letsflutssh $PKG/usr/bin/letsflutssh
          cp linux/packaging/letsflutssh.desktop $PKG/usr/share/applications/
          cp assets/icons/icon.png $PKG/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          # Control file
          cat > $PKG/DEBIAN/control << EOF
          Package: letsflutssh
          Version: ${VER}
          Architecture: amd64
          Maintainer: LetsFLUTssh <noreply@letsflutssh.dev>
          Description: Lightweight cross-platform SSH/SFTP client
           A full-featured SSH terminal and SFTP file browser with session
           management, encrypted credential storage, and tiling terminal layout.
          Depends: libgtk-3-0, libsecret-1-0
          Section: net
          Priority: optional
          EOF
          dpkg-deb --build $PKG
          mv ${PKG}.deb letsflutssh-${VER}-linux-amd64.deb

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb

  build-windows:
    needs: preflight
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Self-signed Authenticode
        # No commercial code-signing cert. Self-sign so Windows at least
        # shows the publisher in the SmartScreen dialog (instead of
        # "Unknown publisher") — users still have to click "More info"
        # → "Run anyway" the first time, but the dialog is less alarming.
        # Certificate is generated fresh per release and discarded; the
        # binary identity that matters is the Ed25519 release signature
        # that the updater verifies (lib/core/update/release_signing.dart).
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=LetsFLUTssh Open Source, O=Llloooggg, C=XX" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyAlgorithm RSA `
            -KeyLength 3072 `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(2)
          $exe = "build\windows\x64\runner\Release\letsflutssh.exe"
          Set-AuthenticodeSignature `
            -FilePath $exe `
            -Certificate $cert `
            -HashAlgorithm SHA256 `
            -TimestampServer http://timestamp.digicert.com
          Get-AuthenticodeSignature $exe

      - name: Package zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package EXE installer
        run: |
          $env:APP_VERSION = "${{ needs.preflight.outputs.version }}"
          $env:BUILD_DIR = "${{ github.workspace }}\build\windows\x64\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\setup.iss
          Move-Item "windows\packaging\Output\letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe" .

      - name: Self-signed Authenticode (installer)
        # Installer inherits its own Authenticode signature — the signing
        # from the previous step only covered letsflutssh.exe inside the
        # build dir; Inno Setup re-wraps it into a separate PE that needs
        # its own signature. Same self-signed cert.
        shell: pwsh
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My |
            Where-Object { $_.Subject -like '*LetsFLUTssh Open Source*' } |
            Select-Object -First 1
          $installer = "letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe"
          Set-AuthenticodeSignature `
            -FilePath $installer `
            -Certificate $cert `
            -HashAlgorithm SHA256 `
            -TimestampServer http://timestamp.digicert.com
          Get-AuthenticodeSignature $installer

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe

  build-macos:
    needs: preflight
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Ad-hoc codesign (no Apple Developer ID)
        # Without any signature, Gatekeeper refuses to launch the app
        # on a modern macOS unless the user runs
        # `xattr -dr com.apple.quarantine` every install. Ad-hoc
        # (`codesign --sign -`) produces a locally-valid signature that
        # Gatekeeper accepts via the right-click → Open flow. The app
        # is still marked "Unidentified developer" because we do not
        # carry an Apple-rooted cert — Apple Developer ID is out of
        # scope (no external paid accounts).
        #
        # **`--deep` is required on macOS 26 (Tahoe).** An earlier
        # revision of this step signed every Mach-O + framework + the
        # outer bundle in independent per-file `codesign --sign -`
        # calls, on the theory that `--deep` was deprecated and could
        # silently skip nested items. That layout produced a bundle
        # where every binary carried `Signature=adhoc,
        # TeamIdentifier=not set` — `codesign -dvv` was happy and the
        # CI sanity gate passed — yet dyld rejected the launch with
        # "mapping process and mapped file (non-platform) have
        # different Team IDs" because each per-file signature had an
        # independent Code Directory hash, and Tahoe's dyld cross-
        # references those across the main binary and its embedded
        # frameworks. A single `codesign --force --deep --sign -` on
        # the outer bundle writes one consistent Code Directory chain
        # and the app launches. `--deep` is deprecated for Developer-ID
        # flows (where the skipping bug matters), but for ad-hoc signing
        # it is the only path that produces the identity macOS 26
        # requires. Verified by user-side `sudo codesign --force
        # --deep --sign -` workaround — the same command we now run in
        # CI rescues a previously-broken per-file bundle on disk.
        run: |
          set -euxo pipefail
          APP="build/macos/Build/Products/Release/letsflutssh.app"

          codesign --force --deep --sign - \
            --options=runtime --timestamp=none "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Sanity gate: every Mach-O binary in the bundle must carry an
          # ad-hoc signature. Framework binaries live at
          # `.../$NAME.framework/Versions/A/$NAME` so a `-path
          # '*/MacOS/*'` filter misses them — inspect every file and
          # only assert on Mach-O.
          while IFS= read -r -d '' bin; do
            if [ "$(file -b --mime-type "$bin")" = application/x-mach-binary ]; then
              codesign -dv "$bin" 2>&1 | grep -q 'Signature=adhoc' \
                || { echo "::error::Not ad-hoc signed: $bin"; exit 1; }
            fi
          done < <(find "$APP/Contents" -type f -print0)

      - name: Package tar.gz
        run: |
          # macOS tarball is NOT reproducible — BSD tar on the
          # runner lacks `--sort=name` and `--mtime=@<epoch>`, the
          # .dmg alongside uses hdiutil which bakes in per-run
          # catalog metadata, and the ad-hoc signed binary carries
          # its own deterministic sig but the packaging around it
          # drifts per run. Users who need reproducible verification
          # should cross-check the Linux `.tar.gz` (reproducible)
          # or rebuild locally and compare ad-hoc sigs on the
          # per-binary level. Documented honestly rather than
          # papered over.
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz ./*.app

      - name: Package dmg
        run: |
          hdiutil create -volname "LetsFLUTssh" -srcfolder build/macos/Build/Products/Release/letsflutssh.app -ov -format UDZO letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-universal
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

  build-android:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEY_PROPERTIES" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 and ANDROID_KEY_PROPERTIES secrets are required for signed releases"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build APKs (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
          mv app-armeabi-v7a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
          mv app-x86_64-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-apk
          retention-days: 7
          path: build/app/outputs/flutter-apk/letsflutssh-*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
    needs: [preflight, build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Sign release artefacts (Ed25519)
        # Single signature per release:
        #
        # 1) `letsflutssh-<version>.sha256sums` — plaintext
        #    `sha256  name` lines, compatible with `sha256sum --check`.
        # 2) `letsflutssh-<version>.sha256sums.sig` — one Ed25519
        #    signature over the whole manifest. Covers every artefact
        #    in the release via its entry in the manifest.
        #
        # Naming uses `.` (not `-`) before the suffix so case-insensitive
        # alphabetical sort on the GitHub Releases page groups all aux
        # artefacts (manifest, signature, attestation) at the bottom
        # instead of slotting them between platform binaries.
        #
        # Old per-artefact `<binary>.sig` files are intentionally
        # **not** produced here. Installs on releases older than the
        # switch-over version (≤ 5.8.1) expect per-artefact signatures
        # and will fail to auto-update across this boundary — that is
        # the expected behaviour. The README tells those users to
        # reinstall manually once; from that reinstall onward, the
        # manifest flow is what drives all future updates.
        #
        # The public key is **not** attached to the release — a
        # downloaded `.pub` forged under MITM would be
        # self-consistent with a forged `.sig`, implying manual-verify
        # security the file cannot actually provide. The app's trust
        # anchor is the byte-identical key baked into
        # `lib/core/update/release_signing.dart`; that bakes in with
        # the install and is what the auto-updater verifies against.
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            echo "::error::RELEASE_SIGNING_KEY secret is empty — aborting release so the update channel stays locked"
            exit 1
          fi
          umask 077
          printf '%s' "$RELEASE_SIGNING_KEY" > /tmp/release-key.pem
          trap 'rm -f /tmp/release-key.pem' EXIT

          # Build the manifest (sha256sum format), names only.
          MANIFEST="artifacts/letsflutssh-${VERSION}.sha256sums"
          : > "$MANIFEST"
          for d in artifacts/linux-x64 artifacts/windows-x64 \
                   artifacts/macos-universal artifacts/android-apk; do
            [ -d "$d" ] || continue
            (cd "$d" && find . -maxdepth 1 -type f \
              ! -name '*.sig' ! -name '*.intoto.jsonl' \
              ! -name '*.sha256sums*' \
              -exec sha256sum {} +) \
              | sed 's| \./| |' >> "$MANIFEST"
          done
          echo "Manifest entries: $(wc -l <"$MANIFEST")"

          # Sign the manifest.
          openssl pkeyutl -sign -inkey /tmp/release-key.pem \
            -rawin -in "$MANIFEST" -out "${MANIFEST}.sig"
          echo "Signed manifest → $(basename "${MANIFEST}.sig") ($(wc -c <"${MANIFEST}.sig") bytes)"

      - name: Attest build provenance
        # Enumerate binaries by extension, NOT `artifacts/.../*` — the
        # previous globs pulled in our Ed25519 `.sig` files that the
        # sign step wrote a few steps earlier. Attesting a signature
        # file is redundant (the signature is metadata ABOUT the
        # binary, not a buildable artefact), produces noisy extra
        # attestation bundles on the release, and falsely implies that
        # `.sig` is something consumers should verify through the
        # SLSA chain — it is not: clients check the Ed25519 signature
        # through the pinned public keys in `release_signing.dart`,
        # a separate trust path.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/linux-x64/*.tar.gz
            artifacts/linux-x64/*.AppImage
            artifacts/linux-x64/*.deb
            artifacts/windows-x64/*.zip
            artifacts/windows-x64/*.exe
            artifacts/macos-universal/*.tar.gz
            artifacts/macos-universal/*.dmg
            artifacts/android-apk/*.apk

      - name: Export provenance for release
        # A single `attest-build-provenance` call covers every artefact
        # in one bundle — the attestation's `subject` array lists all
        # of them with their sha256 digests, so downloading the bundle
        # for any one artefact returns the exact same file. Shipping
        # one `letsflutssh-<version>.intoto.jsonl` instead of ten
        # identical copies is cleaner and reflects the truth:
        # attestation is per-release, not per-artefact.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          # Use any binary to pull the bundle — they all map to the
          # same attestation.
          anchor=""
          for f in artifacts/linux-x64/* artifacts/windows-x64/* \
                   artifacts/macos-universal/* artifacts/android-apk/*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.sig|*.intoto.jsonl|*.sha256sums*) continue ;;
            esac
            anchor="$f"
            break
          done
          if [ -z "$anchor" ]; then
            echo "::warning::No artefact found to anchor attestation download"
            exit 0
          fi
          if gh attestation download "$anchor" -R "${{ github.repository }}"; then
            BUNDLE=$(ls -t sha256*.jsonl 2>/dev/null | head -1)
            if [ -n "$BUNDLE" ]; then
              mv "$BUNDLE" "artifacts/letsflutssh-${VERSION}.intoto.jsonl"
              echo "Exported provenance → letsflutssh-${VERSION}.intoto.jsonl"
            fi
          else
            echo "::warning::No attestation found for ${anchor}"
          fi

      - name: Resolve release tag
        id: tag
        run: |
          # Assign first so shellcheck sees a normal variable
          # comparison rather than a literal-vs-glob match against a
          # GHA placeholder it cannot reason about (placeholders are
          # substituted by GitHub Actions before bash sees them, so
          # SC2193 is a false positive on the inline form).
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v${{ needs.preflight.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag if missing (manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag ${TAG}"
          else
            echo "Tag ${TAG} already exists"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Get the tag immediately before this one (by version order)
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | awk "found{print;exit} /^${TAG}\$/{found=1}")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="$PREV_TAG..$TAG"
          fi

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          DEPS=""

          # Parse conventional commits with optional scope: `type(scope): body`.
          # The scope (e.g. "installer", "import") is surfaced as a leading
          # `(scope)` in the changelog so users see which module each entry
          # touches. Prior version only matched unscoped prefixes and silently
          # dropped every `feat(x):` / `fix(x):` / `refactor(x):` commit.
          while IFS= read -r line; do
            MSG="${line#* }"
            if [[ "$MSG" =~ ^([a-z]+)(\(([a-z0-9][a-z0-9-]*)\))?:[[:space:]]+(.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[3]}"
              BODY="${BASH_REMATCH[4]}"
              PREFIX=""
              [ -n "$SCOPE" ] && PREFIX="($SCOPE) "
              case "$TYPE" in
                feat)          FEATURES="$FEATURES- ${PREFIX}${BODY}\n" ;;
                fix)           FIXES="$FIXES- ${PREFIX}${BODY}\n" ;;
                refactor|perf) IMPROVEMENTS="$IMPROVEMENTS- ${PREFIX}${BODY}\n" ;;
                chore)
                  # Only surface dependency bumps under chore.
                  [ "$SCOPE" = "deps" ] && DEPS="$DEPS- ${BODY}\n"
                  ;;
              esac
            fi
          done <<< "$(git log "$RANGE" --oneline --no-merges)"

          BODY=""
          [ -n "$FEATURES" ] && BODY="$BODY### Features\n$FEATURES\n"
          [ -n "$FIXES" ] && BODY="$BODY### Fixes\n$FIXES\n"
          [ -n "$IMPROVEMENTS" ] && BODY="$BODY### Improvements\n$IMPROVEMENTS\n"
          [ -n "$DEPS" ] && BODY="$BODY### Dependencies\n$DEPS\n"
          [ -z "$BODY" ] && BODY="Maintenance release.\n"

          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk
            artifacts/letsflutssh-${{ needs.preflight.outputs.version }}.sha256sums
            artifacts/letsflutssh-${{ needs.preflight.outputs.version }}.sha256sums.sig
            artifacts/letsflutssh-${{ needs.preflight.outputs.version }}.intoto.jsonl
