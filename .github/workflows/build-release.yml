name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - name: Verify CI status
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push — auto-tag already verified CI passed
            echo "Tag-triggered build — CI verified by auto-tag ✓"
          else
            # Manual dispatch — verify once, no polling
            STATUS=$(gh api "repos/${REPO}/commits/${SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name == "ci" and .app.slug == "github-actions")] | if length == 0 then "missing" else .[0].conclusion // "pending" end')

            if [ "$STATUS" = "success" ]; then
              echo "CI passed ✓"
            else
              echo "::error::CI status is '${STATUS}' for ${SHA}. Run CI first, then retry."
              exit 1
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Extract version from pubspec.yaml
        id: get
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}"

  build-linux-x64:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev lld

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux x64
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz .

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: appimagetool
          key: appimagetool-1.9.1-x86_64-ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0

      - name: Package AppImage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download appimagetool if not cached, then verify hash (even from cache)
          if [ ! -f appimagetool ]; then
            gh release download 1.9.1 --repo AppImage/appimagetool --pattern 'appimagetool-x86_64.AppImage' --output appimagetool
          fi
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  appimagetool" | sha256sum -c
          chmod +x appimagetool
          # Create AppDir structure
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin $APPDIR/usr/lib $APPDIR/usr/share/applications $APPDIR/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* $APPDIR/usr/bin/
          cp linux/packaging/letsflutssh.desktop $APPDIR/usr/share/applications/
          cp linux/packaging/letsflutssh.desktop $APPDIR/
          cp assets/icons/icon.png $APPDIR/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          cp assets/icons/icon.png $APPDIR/letsflutssh.png
          # Create AppRun
          cat > $APPDIR/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/letsflutssh" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun
          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream $APPDIR letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage

      - name: Package deb
        run: |
          VER=${{ needs.preflight.outputs.version }}
          PKG=letsflutssh_${VER}_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/lib/letsflutssh
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps
          # Copy app bundle to /usr/lib, symlink binary
          cp -r build/linux/x64/release/bundle/* $PKG/usr/lib/letsflutssh/
          ln -sf /usr/lib/letsflutssh/letsflutssh $PKG/usr/bin/letsflutssh
          cp linux/packaging/letsflutssh.desktop $PKG/usr/share/applications/
          cp assets/icons/icon.png $PKG/usr/share/icons/hicolor/256x256/apps/letsflutssh.png
          # Control file
          cat > $PKG/DEBIAN/control << EOF
          Package: letsflutssh
          Version: ${VER}
          Architecture: amd64
          Maintainer: LetsFLUTssh <noreply@letsflutssh.dev>
          Description: Lightweight cross-platform SSH/SFTP client
           A full-featured SSH terminal and SFTP file browser with session
           management, encrypted credential storage, and tiling terminal layout.
          Depends: libgtk-3-0, libsecret-1-0
          Section: net
          Priority: optional
          EOF
          dpkg-deb --build $PKG
          mv ${PKG}.deb letsflutssh-${VER}-linux-amd64.deb

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb

  build-windows:
    needs: preflight
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Self-signed Authenticode
        # No commercial code-signing cert. Self-sign so Windows at least
        # shows the publisher in the SmartScreen dialog (instead of
        # "Unknown publisher") — users still have to click "More info"
        # → "Run anyway" the first time, but the dialog is less alarming.
        # Certificate is generated fresh per release and discarded; the
        # binary identity that matters is the Ed25519 release signature
        # that the updater verifies (lib/core/update/release_signing.dart).
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=LetsFLUTssh Open Source, O=Llloooggg, C=XX" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyAlgorithm RSA `
            -KeyLength 3072 `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(2)
          $exe = "build\windows\x64\runner\Release\letsflutssh.exe"
          Set-AuthenticodeSignature `
            -FilePath $exe `
            -Certificate $cert `
            -HashAlgorithm SHA256 `
            -TimestampServer http://timestamp.digicert.com
          Get-AuthenticodeSignature $exe

      - name: Package zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package EXE installer
        run: |
          $env:APP_VERSION = "${{ needs.preflight.outputs.version }}"
          $env:BUILD_DIR = "${{ github.workspace }}\build\windows\x64\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\packaging\setup.iss
          Move-Item "windows\packaging\Output\letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe" .

      - name: Self-signed Authenticode (installer)
        # Installer inherits its own Authenticode signature — the signing
        # from the previous step only covered letsflutssh.exe inside the
        # build dir; Inno Setup re-wraps it into a separate PE that needs
        # its own signature. Same self-signed cert.
        shell: pwsh
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My |
            Where-Object { $_.Subject -like '*LetsFLUTssh Open Source*' } |
            Select-Object -First 1
          $installer = "letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe"
          Set-AuthenticodeSignature `
            -FilePath $installer `
            -Certificate $cert `
            -HashAlgorithm SHA256 `
            -TimestampServer http://timestamp.digicert.com
          Get-AuthenticodeSignature $installer

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-x64
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe

  build-macos:
    needs: preflight
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS (universal — x64 + arm64)
        run: flutter build macos --release

      - name: Ad-hoc codesign (no Apple Developer ID)
        # Without ad-hoc signing, Gatekeeper refuses to launch the app at
        # all on a modern macOS — the user has to run
        # `xattr -dr com.apple.quarantine` every install.
        # Ad-hoc (`codesign --sign -`) produces a locally-valid signature
        # that Gatekeeper accepts via the "right-click → Open" flow.
        # The app is still marked "Unidentified developer" because we
        # don't carry an Apple-rooted cert — Apple Developer ID is out
        # of scope (no external paid accounts).
        # --deep walks the bundle (frameworks, plugins, dylib embeds);
        # --options=runtime enables the hardened runtime so the binary
        # at least doesn't look worse than its signed counterparts.
        run: |
          set -euxo pipefail
          codesign --force --deep --sign - --options=runtime \
            build/macos/Build/Products/Release/letsflutssh.app
          codesign --verify --deep --strict --verbose=2 \
            build/macos/Build/Products/Release/letsflutssh.app

      - name: Package tar.gz
        run: |
          cd build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz *.app

      - name: Package dmg
        run: |
          hdiutil create -volname "LetsFLUTssh" -srcfolder build/macos/Build/Products/Release/letsflutssh.app -ov -format UDZO letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-universal
          retention-days: 7
          path: |
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg

  build-android:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEY_PROPERTIES" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 and ANDROID_KEY_PROPERTIES secrets are required for signed releases"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build APKs (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
          mv app-armeabi-v7a-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
          mv app-x86_64-release.apk letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-apk
          retention-days: 7
          path: build/app/outputs/flutter-apk/letsflutssh-*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true
    needs: [preflight, build-linux-x64, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Sign release artefacts (Ed25519)
        # Produces <artifact>.sig next to every binary. The public keys
        # corresponding to this private key are pinned in
        # lib/core/update/release_signing.dart; on update, the client
        # fetches the .sig alongside the binary and verifies offline.
        # Requires the RELEASE_SIGNING_KEY secret to contain the PEM of
        # an Ed25519 private key (output of `openssl genpkey -algorithm Ed25519`).
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            echo "::error::RELEASE_SIGNING_KEY secret is empty — aborting release so the update channel stays locked"
            exit 1
          fi
          umask 077
          printf '%s' "$RELEASE_SIGNING_KEY" > /tmp/release-key.pem
          trap 'rm -f /tmp/release-key.pem' EXIT
          count=0
          for f in artifacts/linux-x64/* artifacts/windows-x64/* artifacts/macos-universal/* artifacts/android-apk/*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.sig|*.intoto.jsonl) continue ;;
            esac
            openssl pkeyutl -sign -inkey /tmp/release-key.pem -rawin -in "$f" -out "$f.sig"
            count=$((count + 1))
            echo "Signed $(basename "$f") → $(basename "$f").sig ($(wc -c <"$f.sig") bytes)"
          done
          echo "Signed $count artefact(s)."

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/linux-x64/*
            artifacts/windows-x64/*
            artifacts/macos-universal/*
            artifacts/android-apk/*

      - name: Export provenance for release
        run: |
          for f in artifacts/linux-x64/* artifacts/windows-x64/* artifacts/macos-universal/* artifacts/android-apk/*; do
            NAME=$(basename "$f")
            # gh attestation download saves to CWD as sha256:<digest>.jsonl
            if gh attestation download "$f" -R "${{ github.repository }}"; then
              BUNDLE=$(ls -t sha256*.jsonl 2>/dev/null | head -1)
              if [ -n "$BUNDLE" ]; then
                mv "$BUNDLE" "artifacts/${NAME}.intoto.jsonl"
                echo "Exported provenance for ${NAME}"
              fi
            else
              echo "::warning::No attestation found for ${NAME}"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v${{ needs.preflight.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag if missing (manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag ${TAG}"
          else
            echo "Tag ${TAG} already exists"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Get the tag immediately before this one (by version order)
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | awk "found{print;exit} /^${TAG}\$/{found=1}")
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="$PREV_TAG..$TAG"
          fi

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          DEPS=""

          # Parse conventional commits with optional scope: `type(scope): body`.
          # The scope (e.g. "installer", "import") is surfaced as a leading
          # `(scope)` in the changelog so users see which module each entry
          # touches. Prior version only matched unscoped prefixes and silently
          # dropped every `feat(x):` / `fix(x):` / `refactor(x):` commit.
          while IFS= read -r line; do
            MSG="${line#* }"
            if [[ "$MSG" =~ ^([a-z]+)(\(([a-z0-9][a-z0-9-]*)\))?:[[:space:]]+(.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[3]}"
              BODY="${BASH_REMATCH[4]}"
              PREFIX=""
              [ -n "$SCOPE" ] && PREFIX="($SCOPE) "
              case "$TYPE" in
                feat)          FEATURES="$FEATURES- ${PREFIX}${BODY}\n" ;;
                fix)           FIXES="$FIXES- ${PREFIX}${BODY}\n" ;;
                refactor|perf) IMPROVEMENTS="$IMPROVEMENTS- ${PREFIX}${BODY}\n" ;;
                chore)
                  # Only surface dependency bumps under chore.
                  [ "$SCOPE" = "deps" ] && DEPS="$DEPS- ${BODY}\n"
                  ;;
              esac
            fi
          done <<< "$(git log "$RANGE" --oneline --no-merges)"

          BODY=""
          [ -n "$FEATURES" ] && BODY="$BODY### Features\n$FEATURES\n"
          [ -n "$FIXES" ] && BODY="$BODY### Fixes\n$FIXES\n"
          [ -n "$IMPROVEMENTS" ] && BODY="$BODY### Improvements\n$IMPROVEMENTS\n"
          [ -n "$DEPS" ] && BODY="$BODY### Dependencies\n$DEPS\n"
          [ -z "$BODY" ] && BODY="Maintenance release.\n"

          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.tar.gz.sig
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-x64.AppImage.sig
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb
            artifacts/linux-x64/letsflutssh-${{ needs.preflight.outputs.version }}-linux-amd64.deb.sig
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64.zip.sig
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe
            artifacts/windows-x64/letsflutssh-${{ needs.preflight.outputs.version }}-windows-x64-setup.exe.sig
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.tar.gz.sig
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg
            artifacts/macos-universal/letsflutssh-${{ needs.preflight.outputs.version }}-macos-universal.dmg.sig
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm64.apk.sig
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-arm.apk.sig
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk
            artifacts/android-apk/letsflutssh-${{ needs.preflight.outputs.version }}-android-x64.apk.sig
            artifacts/*.intoto.jsonl
