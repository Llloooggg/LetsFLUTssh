name: Semgrep

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

permissions: read-all

jobs:
  semgrep-scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Semgrep
        # `--config auto` pulls language-aware rule packs for every
        # language detected under the scan paths — Dart for lib/ and
        # test/, Rust for rust/ (security/transport core, see
        # ARCHITECTURE.md §3.14). Cargokit is excluded because it is
        # vendored upstream; we only want our own surface scanned.
        run: |
          semgrep scan --config auto \
            --exclude=rust_builder \
            --sarif --sarif-output=semgrep.sarif \
            lib/ test/ rust/

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: semgrep.sarif
