name: OSV-Scanner

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

permissions: read-all

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          # Both lockfiles scanned: Dart deps (pubspec.lock) and the
          # Rust security/transport core (rust/Cargo.lock — see
          # ARCHITECTURE.md §3.14). cargo-deny in `ci.yml::rust-ci`
          # also runs the RustSec advisory DB; OSV here cross-checks
          # against the broader OSV DB which aggregates GitHub
          # Advisories + RustSec + others.
          scan-args: |-
            --lockfile=pubspec.lock
            --lockfile=rust/Cargo.lock
            --format=sarif
            --output=results.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: results.sarif
