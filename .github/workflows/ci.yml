name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/**'
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 1

      - name: Upload SonarCloud source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonar-source
          retention-days: 1
          path: |
            lib/**
            test/**
            pubspec.yaml
            pubspec.lock
            sonar-project.properties

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ERRORS=""
          PATTERN='^(feat|fix|refactor|perf|build|test|docs|chore|ci|i18n|style|revert)(\([a-z0-9-]+\))?!?: \S.+'

          # Get all commits in the PR
          COMMITS=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].messageHeadline')

          # Extract subjects that later revert commits cancel out, so a
          # mistaken commit whose content has already been reverted in the
          # same PR does not block the merge. Accepts both git's default
          # `Revert "…"` and our conventional `revert: "…"` header forms.
          REVERTED=$(printf '%s\n' "$COMMITS" | \
            sed -nE 's/^(Revert |revert: )"([^"]+)".*/\2/p')

          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            # Skip merge commits (e.g. "Merge branch 'x' into y")
            echo "$MSG" | grep -qE '^Merge ' && continue
            # Skip Dependabot auto-generated commits (e.g. "Bump pkg from 1.0 to 2.0")
            echo "$MSG" | grep -qE '^Bump ' && continue
            # Skip revert commits (e.g. 'Revert "feat: something"')
            echo "$MSG" | grep -qE '^Revert "' && continue
            # Skip commits that a later revert in this PR cancels out.
            if [ -n "$REVERTED" ] && printf '%s\n' "$REVERTED" | grep -qxF "$MSG"; then
              continue
            fi
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              ERRORS="$ERRORS  ✗ $MSG\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$ERRORS" ]; then
            echo "::error::Some commit messages don't follow the required format."
            echo ""
            echo "Expected format: type: short description"
            echo "Valid types: feat, fix, refactor, perf, build, test, docs, chore, ci"
            echo ""
            echo "Invalid commits:"
            echo -e "$ERRORS"
            echo ""
            echo "See docs/CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commit messages follow the required format ✓"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
