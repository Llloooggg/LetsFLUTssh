name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/**'
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 1

      - name: Upload SonarCloud source artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sonar-source
          retention-days: 1
          path: |
            lib/**
            test/**
            pubspec.yaml
            pubspec.lock
            sonar-project.properties

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ERRORS=""
          PATTERN='^(feat|fix|refactor|test|docs|chore|ci): \S.+'

          # Get all commits in the PR
          COMMITS=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].messageHeadline')

          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              ERRORS="$ERRORS  ✗ $MSG\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$ERRORS" ]; then
            echo "::error::Some commit messages don't follow the required format."
            echo ""
            echo "Expected format: type: short description"
            echo "Valid types: feat, fix, refactor, test, docs, chore, ci"
            echo ""
            echo "Invalid commits:"
            echo -e "$ERRORS"
            echo ""
            echo "See docs/CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commit messages follow the required format ✓"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
