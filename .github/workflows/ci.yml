name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.*'
      - 'Makefile'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'sonar-project.properties'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.*'
      - 'Makefile'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'sonar-project.properties'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check outdated dependencies
        run: dart pub outdated

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 1

  sonarcloud:
    name: SonarCloud
    needs: analyze-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ERRORS=""
          PATTERN='^(feat|fix|refactor|test|docs|chore|ci): .+'

          # Get all commits in the PR
          COMMITS=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].messageHeadline')

          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              ERRORS="$ERRORS  ✗ $MSG\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$ERRORS" ]; then
            echo "::error::Some commit messages don't follow the required format."
            echo ""
            echo "Expected format: type: short description"
            echo "Valid types: feat, fix, refactor, test, docs, chore, ci"
            echo ""
            echo "Invalid commits:"
            echo -e "$ERRORS"
            echo ""
            echo "See docs/CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commit messages follow the required format ✓"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
