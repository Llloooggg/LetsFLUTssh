name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      # NOTE: `.github/**` deliberately NOT ignored. The release
      # preflight gates on a green CI check-run for the same SHA;
      # ignoring workflow-only changes makes the preflight fail
      # because the CI check-run never appears, breaking
      # `workflow_dispatch` of build-release on those commits.
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: make deps

      - name: Generate code
        run: make gen

      - name: Analyze
        run: make analyze

      - name: Lint workflows
        # actionlint catches YAML / shell / GHA expression bugs that
        # would otherwise only fail at workflow-dispatch time. The
        # local `make lint-workflows` target uses the same pinned
        # actionlint version + the same ignore config.
        run: make lint-workflows

      - name: Verify ARB parity (every locale has the same keys as app_en.arb)
        run: bash scripts/check-arb-parity.sh

      - name: Verify generated localisations are up to date
        # Re-run flutter gen-l10n in place and fail if it mutated any of
        # the checked-in generated files. Catches PRs that add ARB keys
        # but forget to commit the regenerated S.of(context) helpers.
        # --output-dir is ignored when l10n.yaml is present (Flutter warns
        # about it), so we run gen-l10n on the real tree and use
        # `git diff --exit-code` as the oracle.
        run: |
          flutter gen-l10n
          if ! git diff --quiet -- lib/l10n/; then
            echo "::error::generated lib/l10n/app_localizations*.dart is out of sync with the ARB files. Run \`flutter gen-l10n\` and commit." >&2
            git diff -- lib/l10n/ | head -100 >&2 || true
            exit 1
          fi

      - name: Run tests with coverage
        run: make test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 1

      - name: Upload SonarCloud source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonar-source
          retention-days: 1
          path: |
            lib/**
            test/**
            pubspec.yaml
            pubspec.lock
            sonar-project.properties

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          ERRORS=""
          PATTERN='^(feat|fix|refactor|perf|build|test|docs|chore|ci|i18n|l10n|style|revert|security)(\([a-z0-9-]+\))?!?: \S.+'

          # Read commit subjects straight from git so we get the full header —
          # `gh pr view --json commits.messageHeadline` truncates to ~72 chars
          # with an ellipsis, which breaks the revert-match below.
          git fetch --no-tags origin "$PR_BASE_REF" --depth=100
          COMMITS=$(git log --format='%s' "origin/$PR_BASE_REF..HEAD")

          # Extract subjects that later revert commits cancel out, so a
          # mistaken commit whose content has already been reverted in the
          # same PR does not block the merge. Accepts both git's default
          # `Revert "…"` and our conventional `revert: "…"` header forms.
          REVERTED=$(printf '%s\n' "$COMMITS" | \
            sed -nE 's/^(Revert |revert: )"([^"]+)".*/\2/p')

          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue
            # Skip merge commits (e.g. "Merge branch 'x' into y")
            echo "$MSG" | grep -qE '^Merge ' && continue
            # Skip Dependabot auto-generated commits (e.g. "Bump pkg from 1.0 to 2.0")
            echo "$MSG" | grep -qE '^Bump ' && continue
            # Skip revert commits (e.g. 'Revert "feat: something"')
            echo "$MSG" | grep -qE '^Revert "' && continue
            # Skip commits that a later revert in this PR cancels out.
            if [ -n "$REVERTED" ] && printf '%s\n' "$REVERTED" | grep -qxF "$MSG"; then
              continue
            fi
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              ERRORS="$ERRORS  ✗ $MSG\n"
            fi
          done <<< "$COMMITS"

          if [ -n "$ERRORS" ]; then
            echo "::error::Some commit messages don't follow the required format."
            echo ""
            echo "Expected format: type: short description"
            echo "Valid types: feat, fix, refactor, perf, build, test, docs, chore, ci, i18n, l10n, style, revert, security"
            echo ""
            echo "Invalid commits:"
            echo -e "$ERRORS"
            echo ""
            echo "See docs/CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commit messages follow the required format ✓"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
