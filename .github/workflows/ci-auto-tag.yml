name: CI / Auto-Tag

# Triggers after CI completes on main. Reads the version from
# pubspec.yaml and creates an annotated tag if it doesn't exist yet.
#
# Only app-affecting commits (feat/fix/refactor) bump the version,
# so docs/test/ci-only pushes naturally get skipped (tag already exists).
# Dependabot version bumps are also handled here (same idempotent logic).

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: read-all

jobs:
  auto-tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.id == github.event.repository.id)
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag-release
      cancel-in-progress: false
    steps:
      - name: Create tag if version is new
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          SHA="$COMMIT_SHA"
          REPO="${{ github.repository }}"

          # Read version from pubspec.yaml at the CI commit
          VER=$(gh api "repos/${REPO}/contents/pubspec.yaml?ref=${SHA}" \
            --jq '.content' | base64 -d | grep '^version:' | sed 's/version: *//;s/+.*//')
          TAG="v${VER}"

          if [ -z "$VER" ]; then
            echo "Could not extract version from pubspec.yaml — skipping"
            exit 0
          fi

          # Skip if tag already exists (idempotent)
          if gh api "repos/${REPO}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          echo "Creating tag ${TAG} for commit ${SHA}..."

          # Create annotated tag object
          TAG_SHA=$(gh api "repos/${REPO}/git/tags" \
            -f tag="$TAG" -f message="$TAG" -f object="$SHA" -f type="commit" \
            --jq '.sha')

          # Create tag ref
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/${TAG}" -f sha="$TAG_SHA"

          echo "Created tag ${TAG} -> ${SHA}"
