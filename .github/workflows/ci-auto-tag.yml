name: CI / Auto-Tag

# Triggers after CI completes on main. Parses conventional commits since
# the last tag, calculates the semver bump, updates pubspec.yaml, commits,
# and creates an annotated tag.
#
# Bump rules:
#   BREAKING CHANGE / feat!:  → major
#   feat:                     → minor
#   fix: / chore: / refactor: / Dependabot "Bump ..." → patch
#   docs: / test: / ci:       → no bump (tag already exists → skip)

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: read-all

jobs:
  auto-tag:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.id == github.event.repository.id)
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Calculate version bump from commits
        id: bump
        run: |
          # Find the latest version tag
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          echo "Last tag: ${LAST_TAG:-<none>}"
          echo "Commit range: $RANGE"

          BUMP="none"  # none | patch | minor | major

          while IFS= read -r MSG; do
            [ -z "$MSG" ] && continue

            # Skip merge commits
            echo "$MSG" | grep -qE '^Merge ' && continue

            # Skip version-bump commits from this workflow
            echo "$MSG" | grep -qE '^chore: bump version ' && continue

            # BREAKING CHANGE → major
            if echo "$MSG" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\([a-z0-9_-]+\))?!:'; then
              BUMP="major"
              continue
            fi

            # Skip non-bumping types
            echo "$MSG" | grep -qE '^(docs|test|ci)(\([a-z0-9_-]+\))?: ' && continue

            # feat → minor
            if echo "$MSG" | grep -qE '^feat(\([a-z0-9_-]+\))?: '; then
              [ "$BUMP" != "major" ] && BUMP="minor"
              continue
            fi

            # fix / chore / refactor / perf / build → patch
            if echo "$MSG" | grep -qE '^(fix|chore|refactor|perf|build)(\([a-z0-9_-]+\))?: '; then
              [ "$BUMP" = "none" ] && BUMP="patch"
              continue
            fi

            # Dependabot raw format: "Bump X from Y to Z"
            if echo "$MSG" | grep -qE '^Bump .+ from .+ to '; then
              [ "$BUMP" = "none" ] && BUMP="patch"
              continue
            fi

          done <<< "$(git log "$RANGE" --format='%s' --no-merges)"

          echo "Calculated bump: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.bump.outputs.bump != 'none'
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          # Read current version
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          VER="${FULL%%+*}"
          BUILD="${FULL##*+}"

          MAJOR="${VER%%.*}"
          REST="${VER#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"

          # Calculate new version
          case "$BUMP" in
            major) NEW_MAJOR=$((MAJOR+1)); NEW_MINOR=0; NEW_PATCH=0 ;;
            minor) NEW_MAJOR=$MAJOR; NEW_MINOR=$((MINOR+1)); NEW_PATCH=0 ;;
            patch) NEW_MAJOR=$MAJOR; NEW_MINOR=$MINOR; NEW_PATCH=$((PATCH+1)) ;;
          esac
          NEW_BUILD=$((BUILD+1))
          NEW_VER="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"

          echo "Version: ${VER} → ${NEW_VER} (build ${BUILD} → ${NEW_BUILD})"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: ${NEW_VER}+${NEW_BUILD}/" pubspec.yaml

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version ${VER} → ${NEW_VER}"
          git push

          echo "new_ver=$NEW_VER" >> "$GITHUB_OUTPUT"

      - name: Create tag if version is new
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          SHA=$(git rev-parse HEAD)

          # Read version from the current HEAD (may have been bumped above)
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
          TAG="v${VER}"

          if [ -z "$VER" ]; then
            echo "Could not extract version from pubspec.yaml — skipping"
            exit 0
          fi

          # Skip if tag already exists (idempotent)
          if gh api "repos/${REPO}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          echo "Creating tag ${TAG} for commit ${SHA}..."

          # Create annotated tag object
          TAG_SHA=$(gh api "repos/${REPO}/git/tags" \
            -f tag="$TAG" -f message="$TAG" -f object="$SHA" -f type="commit" \
            --jq '.sha')

          # Create tag ref
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/${TAG}" -f sha="$TAG_SHA"

          echo "Created tag ${TAG} -> ${SHA}"
