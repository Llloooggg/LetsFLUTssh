name: SonarCloud

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions: read-all

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.id == github.event.repository.id)
    permissions:
      actions: read
      contents: read
    steps:
      - name: Resolve checkout ref
        id: checkout_ref
        env:
          RESOLVED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: echo "sha=${RESOLVED_SHA}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ steps.checkout_ref.outputs.sha }}

      - name: Download coverage artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
