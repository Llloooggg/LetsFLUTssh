version: 2

secret:
  # Test files contain fake credentials for unit testing (not real secrets)
  # Localization files contain translated UI labels like "password" -> "Passwort"
  # Security source files reference "password" in code logic / comments (not secrets)
  ignored_paths:
    - 'test/**'
    - 'lib/l10n/**'
    - 'lib/core/security/**'
    - 'lib/core/session/session_store.dart'

  ignored_detectors:
    # UI strings and code logic referencing "password" as a concept, not a secret
    - name: generic_password
      paths:
        - 'lib/**'
