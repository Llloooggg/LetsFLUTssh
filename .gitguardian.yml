version: 2

secret:
  # Test files contain fake credentials for unit testing (not real secrets)
  # Localization files contain translated UI labels like "password" -> "Passwort"
  ignored_paths:
    - 'test/**'
    - 'lib/l10n/**'

  ignored_detectors:
    # Security stores reference "password" in code logic / comments, not secrets
    - name: generic_password
      paths:
        - 'lib/core/security/key_store.dart'
        - 'lib/core/session/session_store.dart'
