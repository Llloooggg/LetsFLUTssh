name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 2.30.0+352

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.17.0

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^3.3.1

  # File system paths
  path_provider: ^2.1.5

  # Serialization
  json_annotation: ^4.11.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

  # Crypto (pure Dart, transitive via dartssh2)
  pointycastle: ^4.0.0

  # Archive (pure Dart ZIP)
  archive: ^4.0.4

  # OS drag&drop into app (desktop)
  desktop_drop: ^0.7.0


  # Foreground service (keeps SSH alive on Android screen lock)
  flutter_foreground_task: ^9.2.2

  # Deep links / file open intents
  app_links: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^10.3.10
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.13.1
  mockito: ^5.6.4
  build_verify: ^3.1.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#282C34"
  adaptive_icon_foreground: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
  linux:
    generate: true
    image_path: "assets/icons/icon.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
