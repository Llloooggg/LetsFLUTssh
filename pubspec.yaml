name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 0.8.1+12

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.15.0

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # File system paths
  path_provider: ^2.1.5

  # Serialization
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

  # Crypto (pure Dart, transitive via dartssh2)
  pointycastle: ^4.0.0

  # Archive (pure Dart ZIP)
  archive: ^4.0.4

  # OS drag&drop into app (desktop)
  desktop_drop: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#282C34"
  adaptive_icon_foreground: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
  linux:
    generate: true
    image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true
