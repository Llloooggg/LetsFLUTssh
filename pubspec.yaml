name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.15.0

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # File system paths
  path_provider: ^2.1.5

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Routing
  go_router: ^14.8.1

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^2.5.8

flutter:
  uses-material-design: true
