name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 7.1.1+415
homepage: https://github.com/Llloooggg/LetsFLUTssh
repository: https://github.com/Llloooggg/LetsFLUTssh
issue_tracker: https://github.com/Llloooggg/LetsFLUTssh/issues
documentation: https://github.com/Llloooggg/LetsFLUTssh/tree/main/docs

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.17.1

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^3.3.1

  # File system paths
  path_provider: ^2.1.5

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

  # Crypto (pure Dart, transitive via dartssh2)
  pointycastle: ^4.0.0
  pinenacl: ^0.6.0

  # SHA-256 digest helper (used for SPKI pinning in update channel)
  crypto: ^3.0.5

  # X.509 ASN.1 parsing for SPKI extraction in cert_pinning.dart.
  # Pulled in as a transitive already (via pointycastle); promoted to a
  # direct dependency so the import is explicit rather than relying on
  # a sibling's dep graph.
  asn1lib: ^1.6.5

  # Archive (pure Dart ZIP)
  archive: ^4.0.4

  # OS drag&drop into app (desktop)
  desktop_drop: ^0.7.1


  # Foreground service (keeps SSH alive on Android screen lock)
  flutter_foreground_task: ^9.2.2

  # Deep links / file open intents
  app_links: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0

  # Database (drift = typed SQLite ORM with codegen). The drift
  # runtime is pulled directly — the usual `drift_flutter` convenience
  # wrapper is intentionally not used: it transitively depends on
  # `sqlite3_flutter_libs` and `sqlcipher_flutter_libs` (both EOL
  # upstream), whose Flutter-plugin prebuilts would be bundled into
  # every APK/IPA alongside the libsqlite3 we already compile in-tree
  # from the SQLite3MultipleCiphers submodule. We skip the helper and
  # go straight to `drift` + `package:sqlite3` native_assets hook.
  drift: ^2.32.0

  # FFI helpers (calloc / free) for mlocked secret buffers
  ffi: ^2.1.3

  # Biometric authentication (Face ID / Touch ID / fingerprint) for the
  # optional biometric unlock of master-password mode.
  local_auth: ^3.0.1
  dbus: ^0.7.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.14.0
  mockito: ^5.6.4
  build_verify: ^3.1.0
  plugin_platform_interface: ^2.1.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#282C34"
  adaptive_icon_foreground: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
  linux:
    generate: true
    image_path: "assets/icons/icon.png"

# Build hooks — compile SQLite3MultipleCiphers from the vendored submodule at
# third_party/SQLite3MultipleCiphers. The `source: source` mode points
# native_toolchain_c at sqlite3mc.c (MC's umbrella amalgamation that wraps
# SQLite + the configured cipher schemes) and applies package:sqlite3's
# default compile defines. Building locally avoids the download path in
# the upstream hook — which has a non-deterministic `Object.hash`-based
# cache dirname and no stream timeout, so every invocation re-fetches
# 2.2 MB from GitHub Releases and hangs forever when the asset server
# stalls mid-stream. The submodule SHA is pinned and auto-bumped by
# Dependabot via `package-ecosystem: gitsubmodule`.
hooks:
  user_defines:
    sqlite3:
      source: source
      path: third_party/SQLite3MultipleCiphers/src/sqlite3mc.c
      # Keep only the cipher scheme the app actually uses
      # (ChaCha20-Poly1305 — MC's built-in default when `PRAGMA key`
      # is set without `PRAGMA cipher`, which is what
      # `database_opener.dart:166` does). Every other MC cipher is
      # dead weight on-disk and in the binary — none is referenced
      # anywhere in lib/ — so we disable them at compile time. See
      # docs/ARCHITECTURE.md § "MC cipher choice — ChaCha20-Poly1305"
      # for the retrospective rationale (the earlier docs listed
      # `sqlcipher` scheme by mistake; the live encryption was always
      # ChaCha20-Poly1305).
      #
      # AEGIS additionally has a build-time constraint: its sources
      # live in nested subdirectories (`src/aegis/include/aegis128l.h`,
      # `src/aegis/aegis128l/implementations.h`, etc.) that cross-
      # reference headers needing multiple `-I` flags. The sqlite3
      # package's `source: source` mode only passes a single `-I` for
      # the parent of `path:`, so leaving AEGIS enabled aborts the
      # compile with `aegis128l.h: file not found`. Disabling it is
      # what makes the in-tree compile work at all.
      #
      # Disabling all AES-based schemes (AES-128-CBC, AES-256-CBC,
      # SQLCipher — the latter runs on top of the same AES core)
      # additionally drops `rijndael.c` from the compile, since its
      # inclusion is gated on
      # `HAVE_CIPHER_AES_128_CBC || HAVE_CIPHER_AES_256_CBC
      #  || HAVE_CIPHER_SQLCIPHER`. Net saving on the resulting
      # shared library is ~100-200 KiB off `libsqlite3.so` vs the
      # all-cipher build.
      defines:
        - HAVE_CIPHER_AES_128_CBC=0
        - HAVE_CIPHER_AES_256_CBC=0
        - HAVE_CIPHER_SQLCIPHER=0
        - HAVE_CIPHER_RC4=0
        - HAVE_CIPHER_ASCON128=0
        - HAVE_CIPHER_AEGIS=0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
