name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 0.7.1+10

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.15.0

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # File system paths
  path_provider: ^2.1.5

  # Serialization
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

  # Crypto (pure Dart, transitive via dartssh2)
  pointycastle: ^4.0.0

  # Archive (pure Dart ZIP)
  archive: ^4.0.4

  # OS drag&drop into app (desktop)
  desktop_drop: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
