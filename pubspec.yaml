name: letsflutssh
description: Lightweight cross-platform SSH/SFTP client with GUI
publish_to: 'none'
version: 6.1.0+410
homepage: https://github.com/Llloooggg/LetsFLUTssh
repository: https://github.com/Llloooggg/LetsFLUTssh
issue_tracker: https://github.com/Llloooggg/LetsFLUTssh/issues
documentation: https://github.com/Llloooggg/LetsFLUTssh/tree/main/docs

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # SSH
  dartssh2: ^2.17.1

  # Terminal emulator
  xterm: ^4.0.0

  # State management
  flutter_riverpod: ^3.3.1

  # File system paths
  path_provider: ^2.1.5

  # Serialization
  json_annotation: ^4.11.0

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.1

  # Crypto (pure Dart, transitive via dartssh2)
  pointycastle: ^4.0.0
  pinenacl: ^0.6.0

  # SHA-256 digest helper (used for SPKI pinning in update channel)
  crypto: ^3.0.5

  # Archive (pure Dart ZIP)
  archive: ^4.0.4

  # OS drag&drop into app (desktop)
  desktop_drop: ^0.7.0


  # Foreground service (keeps SSH alive on Android screen lock)
  flutter_foreground_task: ^9.2.2

  # Deep links / file open intents
  app_links: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0

  # Database (drift = typed SQLite ORM with codegen)
  drift: ^2.32.0
  drift_flutter: ^0.3.0

  # FFI helpers (calloc / free) for mlocked secret buffers
  ffi: ^2.1.3

  # Biometric authentication (Face ID / Touch ID / fingerprint) for the
  # optional biometric unlock of master-password mode.
  local_auth: ^3.0.1
  dbus: ^0.7.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.15
  json_serializable: ^6.13.1
  mockito: ^5.6.4
  build_verify: ^3.1.0
  plugin_platform_interface: ^2.1.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#282C34"
  adaptive_icon_foreground: "assets/icons/icon.png"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"
  linux:
    generate: true
    image_path: "assets/icons/icon.png"

# Build hooks — bundle SQLite3MultipleCiphers for database encryption
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
